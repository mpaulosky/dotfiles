name: Squad CI
# Runs on PR to main branch — mirrors pre-push gate (build only, no tests)

on:
  pull_request:
    branches: [dev, preview, main, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [dev, insider]

permissions:
  contents: read

jobs:
  build:
    name: build (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore IssueTrackerApp.slnx

      - name: Build (Release)
        run: dotnet build IssueTrackerApp.slnx --configuration Release --no-restore
