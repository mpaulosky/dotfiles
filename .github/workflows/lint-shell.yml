---
name: Lint Shell Scripts

on:
  push:
    branches: [main]
    paths: ['**.sh', '**.bash', '**/.bashrc', '**/.profile']
  pull_request:
    branches: [main]
    paths: ['**.sh', '**.bash', '**/.bashrc', '**/.profile']

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          severity: warning
