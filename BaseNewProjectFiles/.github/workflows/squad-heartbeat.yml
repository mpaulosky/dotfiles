name: Squad Heartbeat (Ralph)
# ⚠️ SYNC: This workflow is maintained in 4 locations. Changes must be applied to all:
#   - templates/workflows/squad-heartbeat.yml (source template)
#   - packages/squad-cli/templates/workflows/squad-heartbeat.yml (CLI package)
#   - .squad/templates/workflows/squad-heartbeat.yml (installed template)
#   - .github/workflows/squad-heartbeat.yml (active workflow)
# Run 'squad upgrade' to sync installed copies from source templates.

on:
  schedule:
    # Every 30 minutes — adjust via cron expression as needed
    - cron: '*/15 * * * *'

  # React to completed work or new squad work
  issues:
    types: [closed, labeled]
  pull_request:
    types: [opened, labeled, closed]

  # Manual trigger
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check triage script
        id: check-script
        run: |
          if [ -f ".squad/templates/ralph-triage.js" ]; then
            echo "has_script=true" >> $GITHUB_OUTPUT
          else
            echo "has_script=false" >> $GITHUB_OUTPUT
            echo "⚠️ ralph-triage.js not found — run 'squad upgrade' to install"
          fi

      - name: Ralph — Smart triage
        if: steps.check-script.outputs.has_script == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node .squad/templates/ralph-triage.js \
            --squad-dir .squad \
            --output triage-results.json

      - name: Ralph — Apply triage decisions
        if: steps.check-script.outputs.has_script == 'true' && hashFiles('triage-results.json') != ''
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'triage-results.json';
            if (!fs.existsSync(path)) {
              core.info('No triage results — board is clear');
              return;
            }
            
            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (results.length === 0) {
              core.info('📋 Board is clear — Ralph found no untriaged issues');
              return;
            }
            
            for (const decision of results) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: decision.issueNumber,
                  labels: [decision.label]
                });
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: decision.issueNumber,
                  body: [
                    '### 🔄 Ralph — Auto-Triage',
                    '',
                    `**Assigned to:** ${decision.assignTo}`,
                    `**Reason:** ${decision.reason}`,
                    `**Source:** ${decision.source}`,
                    '',
                    '> Ralph auto-triaged this issue using routing rules.',
                    '> To reassign, swap the `squad:*` label.'
                  ].join('\n')
                });
                
                core.info(`Triaged #${decision.issueNumber} → ${decision.assignTo} (${decision.source})`);
              } catch (e) {
                core.warning(`Failed to triage #${decision.issueNumber}: ${e.message}`);
              }
            }
            
            core.info(`🔄 Ralph triaged ${results.length} issue(s)`);

      # Copilot auto-assign step (uses PAT if available)
      - name: Ralph — Assign @copilot issues
        if: success()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.COPILOT_ASSIGN_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let teamFile = '.squad/team.md';
            if (!fs.existsSync(teamFile)) {
              teamFile = '.ai-team/team.md';
            }
            if (!fs.existsSync(teamFile)) return;

            const content = fs.readFileSync(teamFile, 'utf8');

            // Check if @copilot is on the team with auto-assign
            const hasCopilot = content.includes('🤖 Coding Agent') || content.includes('@copilot');
            const autoAssign = content.includes('<!-- copilot-auto-assign: true -->');
            if (!hasCopilot || !autoAssign) return;

            // Find issues labeled squad:copilot with no assignee
            try {
              const { data: copilotIssues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'squad:copilot',
                state: 'open',
                per_page: 5
              });

              const unassigned = copilotIssues.filter(i =>
                !i.assignees || i.assignees.length === 0
              );

              if (unassigned.length === 0) {
                core.info('No unassigned squad:copilot issues');
                return;
              }

              // Feature branches should be created from dev (the active development branch).
              // main is for releases only.
              const baseBranch = 'dev';

              for (const issue of unassigned) {
                try {
                  await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/assignees', {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    assignees: ['copilot-swe-agent[bot]'],
                    agent_assignment: {
                      target_repo: `${context.repo.owner}/${context.repo.repo}`,
                      base_branch: baseBranch,
                      custom_instructions: `Read .squad/team.md (or .ai-team/team.md) for team context and .squad/routing.md (or .ai-team/routing.md) for routing rules.`
                    }
                  });
                  core.info(`Assigned copilot-swe-agent[bot] to #${issue.number}`);
                } catch (e) {
                  core.warning(`Failed to assign @copilot to #${issue.number}: ${e.message}`);
                }
              }
            } catch (e) {
              core.info(`No squad:copilot label found or error: ${e.message}`);
            }

      - name: Ralph — Monitor open PRs
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const SQUAD_LABEL_PREFIX = 'squad:';
            const BOROMIR_LABEL = 'squad:boromir';
            const BOT_USER = 'github-actions[bot]';
            const TWENTY_FOUR_HOURS_MS = 24 * 60 * 60 * 1000;

            // Fetch all open PRs (paginate up to 100)
            const { data: openPRs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            // Filter to PRs that carry at least one squad:* label
            const squadPRs = openPRs.filter(pr =>
              pr.labels.some(l => l.name.startsWith(SQUAD_LABEL_PREFIX))
            );

            if (squadPRs.length === 0) {
              core.info('No open PRs with squad labels — nothing to do');
              return;
            }

            core.info(`Found ${squadPRs.length} open PR(s) with squad labels`);

            for (const pr of squadPRs) {
              try {
                // Skip drafts silently
                if (pr.draft) {
                  core.info(`#${pr.number} is a draft — skipping`);
                  continue;
                }

                const prLabels = pr.labels.map(l => l.name);
                const hasBoromirLabel = prLabels.includes(BOROMIR_LABEL);

                // --- Spam guard: skip if bot already commented in the last 24h ---
                const { data: comments } = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  per_page: 10
                });

                const recentBotComment = comments
                  .filter(c => c.user.login === BOT_USER)
                  .some(c => Date.now() - new Date(c.created_at).getTime() < TWENTY_FOUR_HOURS_MS);

                if (recentBotComment) {
                  core.info(`#${pr.number} — bot already commented in the last 24h, skipping`);
                  continue;
                }

                // --- Determine PR review state ---
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 50
                });

                // Most recent review per reviewer
                const latestByReviewer = {};
                for (const review of reviews) {
                  if (['APPROVED', 'CHANGES_REQUESTED'].includes(review.state)) {
                    latestByReviewer[review.user.login] = review.state;
                  }
                }
                const reviewStates = Object.values(latestByReviewer);
                const isApproved = reviewStates.length > 0 && reviewStates.every(s => s === 'APPROVED');
                const changesRequested = reviewStates.includes('CHANGES_REQUESTED');
                const noReviews = reviews.length === 0;

                // --- Determine CI check status ---
                let allChecksPassing = false;
                try {
                  const { data: checkRuns } = await github.rest.checks.listForRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: pr.head.sha,
                    per_page: 50
                  });
                  const runs = checkRuns.check_runs;
                  allChecksPassing = runs.length > 0 &&
                    runs.every(r => r.status === 'completed' && r.conclusion === 'success');
                } catch (e) {
                  core.warning(`Could not fetch checks for #${pr.number}: ${e.message}`);
                }

                // --- Categorise and compose comment ---
                let body = null;

                if (isApproved && allChecksPassing) {
                  body = [
                    '### ✅ Ralph — PR Ready to Merge',
                    '',
                    'This PR is **approved** and **CI is green** — it is ready to merge.',
                    `Tagging the PR author / assigned squad member: @${pr.user.login}`,
                    '',
                    '> _Ralph auto-monitor — heartbeat check_'
                  ].join('\n');
                } else if (changesRequested) {
                  body = [
                    '### ⚠️ Ralph — Changes Requested',
                    '',
                    'One or more reviewers have requested changes on this PR.',
                    'The assigned squad member should address the feedback before this can move forward.',
                    '',
                    '> _Ralph auto-monitor — heartbeat check_'
                  ].join('\n');
                } else if (noReviews && hasBoromirLabel) {
                  body = [
                    '### 🤖 Ralph — Dependabot PR Needs Review',
                    '',
                    'This Dependabot PR has been auto-labeled for **Boromir (DevOps)** to review.',
                    'Please review the dependency update and merge if safe.',
                    '',
                    '> _Ralph auto-monitor — heartbeat check_'
                  ].join('\n');
                } else if (noReviews && !hasBoromirLabel) {
                  body = [
                    '### 📋 Ralph — PR in Triage Queue',
                    '',
                    'This PR is in the **squad triage queue** — the Lead will assign it to a squad member shortly.',
                    '',
                    '> _Ralph auto-monitor — heartbeat check_'
                  ].join('\n');
                }

                if (body) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    body
                  });
                  core.info(`Commented on #${pr.number}`);
                } else {
                  core.info(`#${pr.number} — no action matched (review in progress?)`);
                }
              } catch (e) {
                core.warning(`Error processing PR #${pr.number}: ${e.message}`);
              }
            }
